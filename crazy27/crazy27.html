<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Layout Playground</title>
    <link rel="stylesheet" href="crazy27.css">
</head>

<body>

    <div class="container">

        <h1>CSS Layout Playground</h1>

        <div class="controls">

            <label>Display</label>
            <select id="display">
                <option value="flex">Flex</option>
                <option value="grid">Grid</option>
            </select>

            <label>Justify Content</label>
            <select id="justify">
                <option value="flex-start">flex-start</option>
                <option value="center">center</option>
                <option value="space-between">space-between</option>
                <option value="space-around">space-around</option>
                <option value="space-evenly">space-evenly</option>
            </select>

            <label>Align Items</label>
            <select id="align">
                <option value="stretch">stretch</option>
                <option value="flex-start">flex-start</option>
                <option value="center">center</option>
                <option value="flex-end">flex-end</option>
            </select>

            <label>Grid Columns</label>
            <input type="number" id="columns" value="3" min="1" max="6">

        </div>

        <div class="playground" id="playground">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>

        <div class="css-output">
            <h3>Generated CSS</h3>
            <pre id="cssCode"></pre>
        </div>

    </div>

    <script src="crazy27.js"></script>

</body>

</html>
