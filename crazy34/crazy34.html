<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BFS Visualizer</title>
    <link rel="stylesheet" href="crazy34.css">
</head>

<body>

    <h1>BFS Traversal Visualizer</h1>

    <div class="controls">
        <button onclick="startBFS()">Start BFS</button>
        <button onclick="resetGraph()">Reset</button>
    </div>

    <div class="graph" id="graph">
        <div class="node" id="A">A</div>
        <div class="node" id="B">B</div>
        <div class="node" id="C">C</div>
        <div class="node" id="D">D</div>
        <div class="node" id="E">E</div>
        <div class="node" id="F">F</div>
    </div>

    <script src="crazy34.js"></script>
</body>

</html>
