<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Selection Sort Visualizer</title>
    <link rel="stylesheet" href="crazy37.css">
</head>
<body>

    <div class="container">
        <h1>Selection Sort Visualizer</h1>

        <div class="input-section">
            <input type="text" id="array-input" placeholder="Enter numbers (e.g. 5,3,8,1)">
            <button onclick="setArray()">Set Array</button>
            <button onclick="selectionSort()">Sort</button>
            <button onclick="resetArray()">Reset</button>
        </div>

        <div id="array-container"></div>
    </div>

    <script src="crazy37.js"></script>
</body>
</html>
