<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="crazy41.css">
</head>

<body>

    <div class="container">

        <div class="glass-panel top-panel">
            <h1>Rock Paper Scissors</h1>
            <div class="scoreboard">
                <p>You: <span id="userScore">0</span></p>
                <p>Computer: <span id="compScore">0</span></p>
            </div>
            <div class="result">
                <p id="resultText">Make your move!</p>
            </div>
        </div>

        <div class="choices">

            <div class="glass-panel choices-panel">
                <h2>Your Choice</h2>
                <div class="choices">
                    <button class="choice" data-choice="rock">
                        <img src="rock.png" alt="Rock">
                    </button>
                    <button class="choice" data-choice="paper">
                        <img src="paper.png" alt="Paper">
                    </button>
                    <button class="choice" data-choice="scissors">
                        <img src="scissors.png" alt="Scissors">
                    </button>
                </div>
            </div>

            <div class="glass-panel comp-panel">
                <h2>Computer's Choice</h2>
                <div id="compChoiceDisplay">
                    <p>Waiting...</p>
                </div>
            </div>

        </div>
    </div>

    <script src="crazy41.js"></script>
</body>

</html>
